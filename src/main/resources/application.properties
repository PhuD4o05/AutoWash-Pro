# H2 Database in-memory
spring.datasource.url=jdbc:h2:mem:carwashdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA (H2)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
app.jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2025!VeryLongAndSecure
app.jwt.expiration-milliseconds=86400000
app.jwt.refresh-expiration-milliseconds=604800000

# Logging
logging.level.com.carwash=DEBUG

# Email (chỉ giữ một lần)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Base URL cho link check-in
app.base-url=http://localhost:8080

#Payos
payos.client-id=your_client_id
payos.api-key=your_api_key
payos.checksum-key=your_checksum_key
payos.return-url=http://localhost:8080/payment/return
payos.cancel-url=http://localhost:8080/payment/cancel

