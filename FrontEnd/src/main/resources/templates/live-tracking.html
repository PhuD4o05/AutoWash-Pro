<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Theo dõi trạng thái rửa xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta http-equiv="refresh" content="3">
</head>
<body>
<div class="container mt-4">
    <h2>📡 Trạng thái khu vực rửa xe (Real-time)</h2>
    <table class="table table-bordered mt-3" id="trackingTable">
        <thead><tr><th>Khu vực</th><th>Trạng thái</th><th>Xe hiện tại</th><th>Thời gian còn lại (ước tính)</th></tr></thead>
        <tbody></tbody>
    </table>
    <a href="/dashboard" class="btn btn-secondary">Quay lại</a>
</div>

<script>
    async function fetchLiveTracking() {
        try {
            const res = await fetch('/api/live-tracking');
            const data = await res.json();
            const tbody = document.querySelector('#trackingTable tbody');
            tbody.innerHTML = '';
            data.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.bayId || item.bayName}</td>
                        <td>${item.status}</td>
                        <td>${item.licensePlate || '-'}</td>
                        <td>${item.estimatedRemainingMinutes || 0} phút</td>
                    </tr>
                `;
            });
        } catch(e) {
            console.error(e);
        }
    }
    fetchLiveTracking();
    setInterval(fetchLiveTracking, 3000);
</script>
</body>
</html>
