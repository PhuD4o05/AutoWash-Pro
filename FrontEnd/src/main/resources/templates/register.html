<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="text-center">Đăng ký tài khoản</h2>
    <form id="registerForm">
        <div class="mb-3">
            <label>Họ tên</label>
            <input type="text" id="fullName" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="email" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Số điện thoại</label>
            <input type="tel" id="phone" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Mật khẩu</label>
            <input type="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Đăng ký</button>
    </form>
    <div id="message" class="mt-3 text-danger"></div>
    <p class="mt-3 text-center"><a href="/login">Đã có tài khoản? Đăng nhập</a></p>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({fullName, email, phone, password})
            });
            if (res.ok) {
                alert('Đăng ký thành công! Vui lòng đăng nhập.');
                window.location.href = '/login';
            } else {
                const err = await res.json();
                document.getElementById('message').innerText = err.message || 'Đăng ký thất bại';
            }
        } catch (error) {
            document.getElementById('message').innerText = 'Lỗi kết nối';
        }
    });
</script>
</body>
</html>
