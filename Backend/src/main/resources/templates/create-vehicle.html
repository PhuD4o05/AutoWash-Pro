<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Thêm xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <h2>Thêm xe mới</h2>
    <form id="vehicleForm">
        <div class="mb-3">
            <label>Biển số xe</label>
            <input type="text" id="licensePlate" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Model (hãng xe)</label>
            <input type="text" id="model" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">Thêm xe</button>
    </form>
    <div id="message" class="mt-3"></div>
    <a href="/dashboard" class="btn btn-secondary mt-2">Quay lại</a>
</div>

<script>
    const token = localStorage.getItem('accessToken');
    if (!token) window.location.href = '/login';

    async function fetchWithAuth(url, options={}) {
        const headers = {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'};
        const res = await fetch(url, {...options, headers});
        if (res.status===401) { localStorage.removeItem('accessToken'); window.location.href='/login'; }
        return res;
    }

    document.getElementById('vehicleForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const licensePlate = document.getElementById('licensePlate').value;
        const model = document.getElementById('model').value;
        try {
            const res = await fetchWithAuth('/api/customers/me/vehicles', {
                method: 'POST',
                body: JSON.stringify({licensePlate, model})
            });
            if (res.ok) {
                alert('Thêm xe thành công!');
                window.location.href = '/dashboard';
            } else {
                const err = await res.json();
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            }
        } catch (error) {
            document.getElementById('message').innerHTML = '<div class="alert alert-danger">Lỗi kết nối</div>';
        }
    });
</script>
</body>
</html>
